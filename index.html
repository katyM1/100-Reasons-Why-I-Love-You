<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 причин, чому я тебе кохаю ❤️</title>
<img src="https://assets.bucketlistly.blog/sites/5adf778b6eabcc00190b75b1/assets/6075182186d092000b192cee/best-free-travel-images-image-2.jpg"
style="width:250px;border-radius:15px;">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#f8f2ea,#e8dccd);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
    color:#444;
}

.container{
    max-width:700px;
    background:fffaf4;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    color:#8b6b4a;
}

.reason{
    font-size:24px;
    margin:30px 0;
    min-height:80px;
}

button{
    background:#b08968;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.counter{
    margin-top:15px;
    color:#888;
}
</style>
</head>

<body>

<div class="container">

<h1>❤️ 100 причин, чому я тебе кохаю ❤️</h1>

<p>
Для найкращого чоловіка у моєму житті
</p>

<div class="reason" id="reason">
Натисни кнопку ❤️
</div>

<button onclick="nextReason()">
Показати причину
</button>

<div class="counter" id="counter"></div>

</div>

<script>

const reasons = [

"Тому що поруч із тобою я почуваюся вдома.",
"Тому що ти завжди мене підтримуєш.",
"Тому що ти змушуєш мене сміятися.",
"Тому що з тобою цікаво навіть нічого не робити.",
"Тому що ти турботливий.",
"Тому що ти уважний до дрібниць.",
"Тому що ти красивий.",
"Тому що ти розумний.",
"Тому що ти добрий.",
"Тому що ти вмієш слухати."

];

let index = 0;

function nextReason(){

if(index < reasons.length){

document.getElementById("reason").innerHTML =
reasons[index];

document.getElementById("counter").innerHTML =
`Причина ${index+1} із ${reasons.length}`;

index++;

}else{

document.getElementById("reason").innerHTML =
"❤️ І найголовніша причина — тому що це саме ТИ ❤️";

}

}

</script>

</body>
</html>
